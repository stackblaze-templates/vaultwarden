databases:
  - name: vaultwarden-db
    databaseName: vaultwarden
    user: vaultwarden
services:
  - type: web
    name: vaultwarden
    runtime: docker
    plan: starter
    autoDeploy: false
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vaultwarden-db
          property: connectionString
      - key: ADMIN_TOKEN
        generateValue: true
